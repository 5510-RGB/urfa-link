name: Keep Render App Awake
on:
  schedule:
    - cron: "*/10 * * * *" # Her 10 dakikada bir çalışır
  workflow_dispatch: # Manuel tetiklemeye izin verir

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Urfa-Link API
        run: curl -sSf https://urfa-link.onrender.com > /dev/null || echo "Sunucu zaten uyanik."
